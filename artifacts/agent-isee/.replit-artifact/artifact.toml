kind = "web"
previewPath = "/"
title = "AGENT;ISEE — Ritual Chain NFT"
version = "1.0.0"
id = "artifacts/agent-isee"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20025

[services.development]
run = "pnpm --filter @workspace/agent-isee run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agent-isee", "run", "build" ]
publicDir = "artifacts/agent-isee/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20025"
BASE_PATH = "/"
